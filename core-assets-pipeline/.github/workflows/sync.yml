name: Sync Core Assets to Edge Store

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  deploy-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # In a real cloud setup, we would push these raw HTML/CSS/JS files directly
      # to Cloudflare KV or an R2 Bucket.
      - name: Publish to Cloudflare KV/R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv:key put --namespace-id=${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }} --binding=ASSETS_BUCKET ./src
