<section class="hero hero--{{alignment}} hero--theme-{{theme}}">
  {{#if backgroundImage}}
  <img class="hero__bg-img" 
       src="{{backgroundImage}}" 
       srcset="{{backgroundImageSrcset}}" 
       sizes="100vw" 
       alt="" 
       fetchpriority="high" 
       style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; z-index: 0; pointer-events: none;" />
  {{/if}}
  <div class="container hero__container">
    <div class="hero__content">
      {{#if tagline}}
      <span class="hero__tagline">
        <span class="hero__tagline-icon">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><polygon points="3,2 13,8 3,14"/></svg>
        </span>
        {{tagline}}
      </span>
      {{/if}}
      <h1 class="hero__title">{{title}}</h1>
      <p class="hero__description">{{description}}</p>
      {{#if ctaText}}
      <div class="hero__actions">
        <a href="{{ctaUrl}}" class="btn btn--primary">{{ctaText}}</a>
      </div>
      {{/if}}
    </div>
  </div>
</section>
